terial_id" style="width:100%"></select>                    </label>                    <label class="form-control w-full min-w-[100px] flex-1">                        <div class="label"><span class="label-text">Qty(gram per pcs)</span></div>                        <input type="number" placeholder="Type here" class="custom-input" id="qty" onKeyUp="calTotalQty()" value="0" />                    </label>                    <label class="form-control w-full min-w-[100px] flex-1">                        <div class="label"><span class="label-text">Wastage(%)</span></div>                        <input type="number" min="0" max="100" placeholder="Type here" class="custom-input" id="wastage" value="0" onKeyUp="calWastage()" />                        <input type="hidden" name="wastage_qty" id="wastage_qty" value="0">                        <input type="hidden" name="tmp_id" id="tmp_id" value="">                        <input type="hidden" name="total_day_wastage" id="total_day_wastage" value="">                        <input type="hidden" name="total_day_qty" id="total_day_qty" value="">                    </label>                    <label class="form-control w-full min-w-[100px] flex-1">                        <div class="label"><span class="label-text">Total Qty(kg)</span></div>                        <input type="number" placeholder="Type here" class="custom-input" name="total_qty" id="total_qty" value="0" readonly/>                    </label>                    <button class="btn btn-primary" id="addItem" type="button"><i class="fa-solid fa-plus"></i></button>                </div>            </div>        </form>    </div>    <div class="p-6 mt-5 shadow-md bg-base-100 rounded-xl">        <input type="hidden" id="frm" value=""/>        <input type="hidden" id="to" value=""/>        <input type="hidden" id="pno" value=""/>        <div class="flex flex-wrap w-full mb-2">            <h2 class="mb-3 text-xl font-bold">Batch</h2>            <div class="join shadow-md ml-auto mr-auto sm:mr-0" id="paginationList"></div>        </div>        <div class="overflow-x-auto" id="TempGrid">            <table class="table table-zebra">                <thead class="text-base bg-base-200">                <tr>                    <th>Sl</th>                    <th>Product Name</th>                    <th>Qty(gram)</th>                    <th>Wastage(%)</th>                    <th>Qty(kg)</th>                    <th class="text-center">Options</th>                </tr>                </thead>                <tbody>                <tr class="text-center"><th colspan="6">No record found</th></tr>                </tbody>            </table>        </div>        <div class="flex gap-1 mt-3">            <button class="btn btn-primary" id="handleSubmit" type="submit">Submit</button>            <button class="btn btn-neutral" id="reset" type="reset">Clear</button>        </div>    </div></div><script>    // --- 1. Initialize Select2 ---    $(document).ready(function() {        // Normal Select2 (No AJAX)        $('#finish_goods').select2({            dropdownParent: $('#finish_goods_container')        });        $('#out_from').select2({            dropdownParent: $('#delivery_container')        });        // Currency - Static Load        $('#currency_id').select2({            dropdownParent: $('#currency_container') // FIX: Position relative to parent        });        // Raw Material - Static Load        $('#raw_material_id').select2({            dropdownParent: $('#raw_material_container') // FIX: Position relative to parent        });        // Load Static Data        getFinishGoodsList();        getDeliveryPointList();        getCurrencyList();        getRawMaterialList();        LoadTempTable();    });    function getFinishGoodsList() {        axios.post(API_URL, {            cmd: "getproductlist",            project_id: userData.project_id        }).then(function(response) {            if (response.data.status) {                $('#finish_goods').html(response.data.data).trigger('change');            }        }).catch(function(error) {            console.log(error);        });    }    function getDeliveryPointList() {        axios.post(API_URL, {            cmd: "getdeliverypointlist",            project_id: userData.project_id,            branch_id: userData.branch_id        }).then(function(response) {            if (response.data.status) {                $('#out_from').html(response.data.data).trigger('change');            }        }).catch(function(error) {            console.log(error);        });    }    // --- 2. Get Lists ---    const getCurrencyList = () => {        axios.post(API_URL, {cmd: "currency-list"}).then(function (response) {            if (response.data.status) {                const $select = $("#currency_id");                $select.html(response.data.data);                $select.trigger('change');            }        })    }    const getRawMaterialList = () => {        axios.post(API_URL, {cmd: "raw-material-product-list"}).then(function (response) {            if (response.data.status) {                const $select = $("#raw_material_id");                $select.html(response.data.data);                $select.trigger('change');            }        })    }    const LoadTempTable = (frm = "", to = "", pno = "") => {        axios.post(API_URL, {            cmd: "get-tmp-batch-list",            "created_by": userData.user_id,            "project_id": userData.project_id,            "from": frm,            "to": to,            "page_no": pno        }).then(function (response) {            if (response.data.status) {                $('#TempGrid').html(response.data.html);                $('#paginationList').html(response.data.pagination);                updateTotalData(response.data.totalInfo);            }        })    }    const updateTotalData = (data) => {        $('#total_day_wastage').val(data.TotalDayWastage);        $('#total_day_qty').val(data.TotalDayQty);    }    // --- 3. Add Item ---    const addItem = document.getElementById('addItem');    addItem.onclick = (event) => {        event.preventDefault();        $('#alert').hide();        $('#danger-alert').hide();        $("#addItem").prop("disabled", true);        var batch_name = $('#batch_name').val();        var finish_goods = $("#finish_goods").val(); // Directly from Select2        var currency_id = $("#currency_id").val();        var out_from = $('#out_from').val(); // Directly from Select2        var product_id = $('#raw_material_id').val();        var qty = $('#qty').val();        var wastage = $('#wastage').val();        var wastage_qty = $('#wastage_qty').val();        var total_qty = $('#total_qty').val();        var tmp_id = $('#tmp_id').val();        let validation = true;        if (product_id != "" && currency_id != "", qty != "" && (parseInt(qty) > 0)) {            validation = true        } else {            validation = false        }        if (validation == false) {            $("#addItem").prop("disabled", false);            $('#danger-alert').show();            $('#danger-alert').html('Record did not saved! Please fill data in required fields');            return false;        }        const formData = {            "cmd": "add-temp-batch-item",            "project_id": userData.project_id,            "created_by": userData.user_id,            "batch_name": batch_name,            "finish_goods": finish_goods,            "currency_id": currency_id,            "product_id": product_id,            "out_from": out_from,            "qty": qty,            "wastage": wastage,            "wastage_qty": wastage_qty,            "total_qty": total_qty,            "tmp_id": tmp_id        }        if (validation == true) {            axios.post(API_URL, formData).then(function (response) {                if (response.data.status) {                    ClearFields();                    $("#addItem").prop("disabled", false);                    $('#TempGrid').html(response.data.htmlData.html);                    $('#paginationList').html(response.data.htmlData.pagination);                    updateTotalData(response.data.htmlData.totalInfo);                    $('#danger-alert').hide();                    $('#alert').show();                    $('#alert').html(response.data.message);                } else {                    $("#addItem").prop("disabled", false);                    $('#alert').hide();                    $('#danger-alert').show();                    $('#danger-alert').html(response.data.message);                }            })        }        return false;    }    // --- 4. Edit ---    const editTempRecord = (id) => {        axios.post(API_URL, { cmd: "get-temp-batch-infobyid", "tmp_id": id }).then(function (response) {            const data = response.data.data || [];            $('#tmp_id').val(data.tmp_id);            $('#batch_name').val(data.batch_name);            // Set Select2 values            var newOption = new Option(data.finish_goods_name, data.finish_goods, true, true);            $('#finish_goods').val(data.finish_goods).trigger('change');            $('#currency_id').val(data.currency).trigger('change');            var newOption2 = new Option(data.out_from_name, data.out_from, true, true);            $('#out_from').append(newOption2).trigger('change');            $('#raw_material_id').val(data.productid).trigger('change');            $('#qty').val(data.day_qty);            $('#wastage').val(data.day_wastage_persent);            $('#wastage_qty').val(data.day_wastage_qty);            $('#total_qty').val(data.total_day);            $('#alert').show();            $('#alert').html('Ready to Edit!');        });    }    // --- 5. Save Batch ---    const saveBatch = document.getElementById('handleSubmit');    saveBatch.onclick = (event) => {        event.preventDefault();        $('#alert').hide();        $('#danger-alert').hide();        $("#handleSubmit").prop("disabled", true);        var batch_name = $('#batch_name').val();        var finish_goods = $("#finish_goods").val();        var out_from = $('#out_from').val();        var currency_id = $("#currency_id").val();        let validation = true;        if (batch_name != "" && finish_goods != "" && out_from != "" && currency_id != "") {            validation = true        } else {            validation = false;        }        if (validation == false) {            $("#handleSubmit").prop("disabled", false);            $('#danger-alert').show();            $('#danger-alert').html('Record did not saved! Please fill data in required fields');            return false;        }        const formData = {            "cmd": "add-new-batch",            "project_id": userData.project_id,            "created_by": userData.user_id,            "branch_id": userData.branch_id,            "batch_name": batch_name,            "finish_goods": finish_goods,            "out_from": out_from,            "currency_id": currency_id        }        if (validation == true) {            axios.post(API_URL, formData).then(function (response) {                if (response.data.status) {                    $(this).find('form').trigger('reset');                    ClearAllFields();                    $("#handleSubmit").prop("disabled", false);                    $('#TempGrid').html(response.data.htmlData.html);                    $('#paginationList').html(response.data.htmlData.pagination);                    updateTotalData(response.data.htmlData.totalInfo);                    $('#danger-alert').hide();                    $('#alert').show();                    $('#alert').html(response.data.message);                } else {                    $("#handleSubmit").prop("disabled", false);                    $('#alert').hide();                    $('#danger-alert').show();                    $('#danger-alert').html(response.data.message);                }            })        }        return false;    }    $('#reset').click(function (e) {        e.preventDefault();        $('#alert').hide();        $('#danger-alert').hide();        ClearAllFields();        LoadTempTable();    });    const ClearFields = () => {        $('#tmp_id').val("");        $('#raw_material_id').val(null).trigger('change');        $('#qty').val("0");        $('#wastage').val("0");        $('#wastage_qty').val("");        $('#total_qty').val("0");        $('#deleted_id').val("");    }    const ClearAllFields = () => {        $('#batch_name').val("");        $('#finish_goods').val(null).trigger('change');        $('#currency_id').val(null).trigger('change');        $('#out_from').val(null).trigger('change');        ClearFields();    }    // --- 6. Delete ---    const deleteTempRecord = (id) => {        Swal.fire({            title: "Are you sure?",            text: "You want to delete this!",            icon: "warning",            showCancelButton: true,            confirmButtonColor: "#3085d6",            cancelButtonColor: "#d33",            confirmButtonText: "Yes, delete it!"        }).then((result) => {            if (result.isConfirmed) {                axios.post(API_URL, { cmd: "delete-tmp-batch-record", deleted_id: id }).then(function (response) {                    if (response.data.status == true) {                        $('#alert').show(1000);                        $('#alert').html('Record deleted successfully!!!');                        const frm = $('#frm').val();                        const to = $('#to').val();                        const pno = $('#pno').val();                        LoadTempTable(frm, to, pno);                    } else {                        $('#danger-alert').show(1000);                        $('#danger-alert').html('Record did not deleted. Try again!');                    }                })            }        });        return false;    }    const nextPage = (frm, to, pno) => {        $('#frm').val(frm);        $('#to').val(to);        $('#pno').val(pno);        LoadTempTable(frm, to, pno);        return false;    }    const calTotalQty = () => {        let qty = parseFloat($("#qty").val());        let wastage_qty = parseFloat($("#wastage_qty").val());        if (isNaN(qty)) qty = 0;        if (isNaN(wastage_qty)) wastage_qty = 0;        let totalvalue = qty + wastage_qty;        $("#total_qty").val((totalvalue / 1000).toFixed(4));    }    const calWastage = () => {        let qty = parseFloat($("#qty").val());        let wastage = parseFloat($("#wastage").val());        if (isNaN(qty)) qty = 0;        if (isNaN(wastage)) wastage = 0;        let wastage_qty = ((qty / 100) * wastage);        $("#wastage_qty").val(wastage_qty.toFixed(4));        calTotalQty();    }</script></body>
