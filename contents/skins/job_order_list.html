ess: #22c55e;        --border-color: #e5e7eb;        --text-main: #1f2937;        --text-muted: #6b7280;    }    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f9fafb; color: var(--text-main); }    /* Layout */    .p-6 { padding: 1.5rem; }    .shadow-md { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }    .bg-base-100 { background-color: var(--base-100); }    .rounded-xl { border-radius: 0.75rem; }    .mb-3 { margin-bottom: 0.75rem; }    .mb-4 { margin-bottom: 1rem; }    .mb-7 { margin-bottom: 1.75rem; }    .mt-5 { margin-top: 1.25rem; }    .mt-8 { margin-top: 2rem; }    .mt-3 { margin-top: 0.75rem; }    .text-2xl { font-size: 1.5rem; line-height: 2rem; }    .text-xl { font-size: 1.25rem; line-height: 1.75rem; }    .font-bold { font-weight: 700; }    .text-center { text-align: center; }    .w-full { width: 100%; }    .flex { display: flex; }    .flex-wrap { flex-wrap: wrap; }    .flex-1 { flex: 1 1 0%; }    .items-center { align-items: center; }    .items-end { align-items: flex-end; }    .gap-2 { gap: 0.5rem; }    .gap-1 { gap: 0.25rem; }    /* Forms */    .form-control { width: 100%; position: relative; }    .min-w-[200px] { min-width: 200px; }    .min-w-[150px] { min-width: 150px; }    .label { display: flex; padding: 0.5rem 0; font-size: 0.875rem; font-weight: 500; }    .label-text { margin-left: 0.25rem; }    .custom-input, .custom-select {        width: 100%;        padding: 0.5rem 1rem;        border: 1px solid var(--border-color);        border-radius: 0.5rem;        font-size: 0.875rem;        outline: none;        transition: border-color 0.2s;        box-sizing: border-box; /* Important for padding */    }    .custom-input:focus, .custom-select:focus { border-color: var(--primary); ring: 2px solid var(--primary); }    /* Buttons */    .btn {        display: inline-flex;        align-items: center;        ju       border-radius: 5px;        font-size: 16px;        cursor: pointer;    }    td#save-option{        padding: 20px 0 15px 0;    }    .containerDiv {        padding: 20px;    }    button.btn {        width: auto;        border: 1px solid #00000026;    }    button.btn i {        color: #000 !important;    }    button#addItem i {        color: #fff !important;    }    button.btn {        width: auto;        border: 1px solid #00000026;        color: #fff !important;    }    button.btn-danger:hover {        background-color: hsl(0deg 84.24% 60.2%);    }</style><style>    .modal {        display: none;        position: fixed;        inset: 0; /* replaces top/left/width/height */        background-color: rgba(0,0,0,0.5);        z-index: 99999;   /* VERY HIGH */        align-items: center;        justify-content: center;        opacity: 0;        transition: opacity 0.3s ease;        pointer-events: auto;  /* IMPORTANT */    }    .modal.show {        display: flex !important;        opacity: 1 !important;    }    .modal-dialog {        background: #fff;        border-radius: 8px;        width: 90%;        max-width: 992px;        position: relative;        z-index: 1001; /* Content Layer (Must be higher than modal) */        margin: auto;        box-shadow: 0 4px 8px rgba(0,0,0,0.2);    }    .modal-dialog {        position: relative;        z-index: 100000;    }    .modal-header {        display: flex;        justify-content: space-between;        align-items: center;        padding: 15px;        border-bottom: 1px solid #e5e7eb;        font-weight: bold;    }    .modal-body {        padding: 15px;        max-height: 70vh;        overflow-y: auto;    }    .modal-footer {        padding: 15px;        border-top: 1px solid #e5e7eb;        text-align: right;    }    .btn-close {        background: none;        border: none;        font-size: 24px;        line-height: 1;        cursor: pointer;        color: #666;        z-index: 1002; /* Button Layer (Highest) */        position: relative;    }    .btn-close:hover { color: #000; }    .modal.show {        display: flex !important;        opacity: 1 !important;        pointer-events: auto;    }    #paginationContainer .flex.justify-center.gap-2.mt-4 {        align-items: center;    }</style><body><div class="containerDiv">    <!-- Card: Search Form -->    <div class="p-6 shadow-md bg-base-100 rounded-xl">        <div id="danger-alert" class="alert alert-danger" role="alert"></div>        <div id="success-alert" class="alert alert-success" role="alert"></div>        <form id="searchForm" onsubmit="return false">            <div class="flex flex-wrap items-center gap-2">                <div class="form-control w-full min-w-[200px] flex-1">                    <div class="label">                        <span class="label-text">Job Name</span>                    </div>                    <input type="text" placeholder="Type here" class="custom-input" id="search_job_name" name="job_name" autocomplete="off" />                </div>                <div class="form-control w-full min-w-[150px] flex-1">                    <div class="label">                        <span class="label-text">From</span>                    </div>                    <input type="date" placeholder="Type here" class="custom-input" id="from_date" name="from_date" />                </div>                <div class="form-control w-full min-w-[150px] flex-1">                    <div class="label">                        <span class="label-text">To</span>                    </div>                    <input type="date" placeholder="Type here" class="custom-input" id="to_date" name="to_date" />                </div>                <button class="btn btn-primary" id="handleSearch" type="button" style="margin-top: 35px;">                    <i class="fa-solid fa-magnifying-glass" style="margin-right:5px;"></i> Search                </button>                <button class="btn btn-neutral" id="resetSearch" type="button" style="margin-top: 35px;">                    Reset                </button>            </div>        </form>    </div>    <!-- Card: List -->    <div class="p-6 mt-5 shadow-md bg-base-100 rounded-xl">        <div class="flex flex-wrap w-full mb-2 justify-between items-center">            <h2 class="mb-3 text-xl font-bold">Job Order List</h2>        </div>        <div class="overflow-x-auto" id="TempGrid">            <!-- Master Table Loaded via JS -->            <table class="table table-zebra">                <thead class="text-base bg-base-200">                <tr>                    <th>Sl</th>                    <th>Voucher</th>                    <th>Job Name</th>                    <th>Date</th>                    <th class="text-center">Options</th>                </tr>                </thead>                <tbody id="jobTableBody">                <tr class="text-center">                    <td colspan="5">Loading...</td>                </tr>                </tbody>            </table>        </div>        <!-- Pagination Container -->        <div id="paginationContainer" class="mt-4"></div>    </div></div><!-- Modal for Job Details --><div class="modal" id="jobDetailsModal">    <div class="modal-dialog modal-lg">        <div class="modal-content">            <div class="modal-header" style="padding: 15px; border-bottom: 1px solid #e5e7eb;">                <h5 class="modal-title" id="jobDetailsModalLabel">Job Order Details</h5>                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="closeModal()">X</button>            </div>            <div class="modal-body" style="padding: 15px;">                <div id="detailsContent">                    <!-- Details loaded here -->                </div>            </div>            <div class="modal-footer" style="padding: 15px; border-top: 1px solid #e5e7eb; text-align: right;">                <button type="button" class="btn btn-neutral btn-close-footer" onclick="closeModal()">Close</button>            </div>        </div>    </div></div><!-- Modal for Edit Master --><div class="modal" id="editMasterModal">    <div class="modal-dialog">        <div class="modal-content">            <div class="modal-header">                <h5 class="modal-title">Edit Job</h5>                <button type="button" class="btn-close" id="btnCloseEditModal">X</button>            </div>            <div class="modal-body" style="max-height: 80vh; overflow-y: auto;">                <input type="hidden" id="edit_job_id">                <!-- Master Fields -->                <div class="form-control mb-3">                    <div class="label"><span class="label-text">Job Name</span></div>                    <input type="text" class="custom-input" id="edit_job_name" />                </div>                <div class="form-control mb-3">                    <div class="label"><span class="label-text">Job Date</span></div>                    <input type="date" class="custom-input" id="edit_job_date" />                </div>                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">                <h6 class="mb-3 font-bold">Job Details</h6>                <!-- Details Table -->                <div class="overflow-x-auto">                    <table class="table table-zebra" style="font-size: 12px;">                        <thead>                        <tr>                            <th>Batch</th>                            <th>Machine</th>                            <th>Customer</th>                        </tr>                        </thead>                        <tbody id="editDetailsBody">                        <!-- Rows will be injected by JS -->                        </tbody>                    </table>                </div>            </div>            <div class="modal-footer">                <button type="button" class="btn btn-neutral" id="btnCancelEditModal">Cancel</button>                <button type="button" class="btn btn-primary" id="btnSaveEditModal">Update All</button>            </div>        </div>    </div></div><script>    // --- Master List & Search Logic ---    const API_URL = "index.php?app=job_order";    let currentPage = 1;    // --- Helper Functions ---    async function fetchJobData(cmd, data = {}) {        const formData = new FormData();        formData.append('cmd', cmd);        for (const key in data) {            formData.append(key, data[key]);        }        try {            const response = await fetch(API_URL, {                method: 'POST',                body: formData,                headers: { 'X-Requested-With': 'XMLHttpRequest' }            });            return await response.json();        } catch (error) {            showAlert('danger', 'Server connection error!');            return null;        }    }    function showAlert(type, message) {        const alerts = {            success: document.getElementById('success-alert'),            danger: document.getElementById('danger-alert')        };        alerts.success.classList.remove('show');        alerts.danger.classList.remove('show');        if(type === 'success') {            alerts.success.textContent = message;            alerts.success.classList.add('show');        } else {            alerts.danger.textContent = message;            alerts.danger.classList.add('show');        }        setTimeout(() => {            alerts.success.classList.remove('show');            alerts.danger.classList.remove('show');        }, 4000);    }    // --- Master List & Search Logic ---    // Initial Load    document.addEventListener('DOMContentLoaded', () => {        loadMasterList(1);    });    // Search Button Click    document.getElementById('handleSearch').addEventListener('click', function() {        loadMasterList(1); // Reset to page 1 on new search    });    // Reset Button Click    document.getElementById('resetSearch').addEventListener('click', function() {        document.getElementById('searchForm').reset();        loadMasterList(1);    });    // Pagination Change    window.changePage = function(page) {        loadMasterList(page);    };    // Load Master List Function    async function loadMasterList(page) {        currentPage = page;        const formData = new FormData();        formData.append('cmd', 'get_master_list');        formData.append('page', page);        formData.append('job_name', document.getElementById('search_job_name').value);        formData.append('from_date', document.getElementById('from_date').value);        formData.append('to_date', document.getElementById('to_date').value);        try {            const response = await fetch(API_URL, {                method: 'POST',                body: formData,                headers: { 'X-Requested-With': 'XMLHttpRequest' }            });            const result = await response.json();            if (result.status) {                document.getElementById('jobTableBody').innerHTML = result.html;                document.getElementById('paginationContainer').innerHTML = result.pagination;            } else {                document.getElementById('jobTableBody').innerHTML = '<tr><td colspan="7" class="text-center">Error loading data</td></tr>';            }        } catch (error) {            console.error('Error:', error);        }    }    // --- Details Modal Logic ---    const modal = document.getElementById('jobDetailsModal');    const modalDialog = modal.querySelector('.modal-dialog');    const detailsContent = document.getElementById('detailsContent');    // OPEN MODAL    function openModal(modalEl = "") {        if(modalEl){            modalEl.style.display = 'flex';            setTimeout(() => {                modalEl.classList.add('show');            }, 10);        }else{            modal.style.display = 'flex';            setTimeout(() => {                modal.classList.add('show');            }, 10);        }    }    // CLOSE MODAL    function closeModal(modalEl = "") {        if(modalEl){            modalEl.classList.remove('show');            setTimeout(() => {                modalEl.style.display = 'none';            }, 300);        }else{            modal.classList.remove('show');            setTimeout(() => {                modal.style.display = 'none';            }, 300);        }    }    // Close when clicking X or footer button    modal.addEventListener('click', function (e) {        // If clicking background        if (e.target === modal) {            closeModal();        }    });    // Stop propagation inside dialog    modalDialog.addEventListener('click', function (e) {        e.stopPropagation();    });    // Close buttons    document.addEventListener('click', function(e) {        if (e.target.classList.contains('btn-close') ||            e.target.classList.contains('btn-close-footer')) {            closeModal();        }    });    // Global View Details    async function viewDetails(voucher) {        detailsContent.innerHTML = '<div style="text-align:center; padding:20px;">Loading...</div>';        openModal();        const formData = new FormData();        formData.append('cmd', 'get_job_details');        formData.append('voucher', voucher);        try {            const response = await fetch(API_URL, {                method: 'POST',                body: formData,                headers: { 'X-Requested-With': 'XMLHttpRequest' }            });            const result = await response.json();            if (result.status) {                detailsContent.innerHTML = result.html;            } else {                detailsContent.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Error loading details</div>';            }        } catch (error) {            console.error(error);            detailsContent.innerHTML = '<div style="text-align:center; padding:20px; color:red;">Server Error</div>';        }    };    // 1. Edit Master Function    // --- Edit Master Logic with Modal ---    const editModal = document.getElementById('editMasterModal');    const btnCloseEditModal = document.getElementById('btnCloseEditModal');    const btnCancelEditModal = document.getElementById('btnCancelEditModal');    const btnSaveEditModal = document.getElementById('btnSaveEditModal');    // Open Edit Modal    async function editMaster(id) {        const modal = document.getElementById('editMasterModal');        const tbody = document.getElementById('editDetailsBody');        // 1. OPEN MODAL FIRST (User sees the popup immediately)        openModal(modal);        // Show loading state        tbody.innerHTML = '<tr><td colspan="5" class="text-center">Loading details...</td></tr>';        // 2. Fetch Data        const response = await fetchJobData('get_job_for_edit', { id: id });        if (response && response.status && response.data) {            const d = response.data;            // Fill Master Inputs            document.getElementById('edit_job_id').value = d.id;            document.getElementById('edit_job_name').value = d.job_name;            document.getElementById('edit_job_date').value = d.job_date;            // 3. BUILD HTML STRING IN MEMORY (Fast)            let html = '';            if (d.details && d.details.length > 0) {                d.details.forEach((det) => {                    // Note: Ensure batchList, machineList, customerList are defined globally or above this function                    html += `                        <tr>                            <input type="hidden" class="det_id" value="${det.id}">                            <td>                                <select class="custom-select det_batch" style="padding: 5px;">                                    ${getOptions(batchList, 'batch_id', 'batch_name', det.batch_id)}                                </select>                            </td>                            <td>                                <select class="custom-select det_machine" style="padding: 5px;">                                    ${getOptions(machineList, 'machine_id', 'machine_name', det.machine_id)}                                </select>                            </td>                            <td>                                <select class="custom-select det_customer" style="padding: 5px;">                                    ${getOptions(customerList, 'sub_id', 'sub_head_name', det.customer_id)}                                </select>                            </td>                        </tr>                    `;                });            } else {                html = '<tr><td colspan="5" class="text-center">No details found</td></tr>';            }            // 4. UPDATE DOM ONCE (Critical for performance)            tbody.innerHTML = html;        } else {            tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="color:red">Failed to load job</td></tr>';            showAlert('danger', 'Failed to load job');        }    };        // Handle Update Button Click in Modal    if(btnSaveEditModal) btnSaveEditModal.addEventListener('click', async function() {        const formData = new FormData();        // 1. Master Data        formData.append('cmd', 'update_job_master');        formData.append('job_id', document.getElementById('edit_job_id').value);        formData.append('job_name', document.getElementById('edit_job_name').value);        formData.append('job_deadline', document.getElementById('edit_job_date').value);        // 2. Details Data (Array)        const rows = document.querySelectorAll('#editDetailsBody tr');        rows.forEach((row, index) => {            // Skip empty rows or "No details found" message            const id = row.querySelector('.det_id');            if(!id) return;            formData.append(`details[${index}][id]`, id.value);            formData.append(`details[${index}][batch_id]`, row.querySelector('.det_batch').value);            formData.append(`details[${index}][machine_id]`, row.querySelector('.det_machine').value);            formData.append(`details[${index}][customer_id]`, row.querySelector('.det_customer').value);        });        if (!formData.get('job_name') || !formData.get('job_deadline')) {            alert("Please fill all Master fields");            return;        }        const response = await fetch(API_URL, {            method: 'POST',            body: formData,            headers: { 'X-Requested-With': 'XMLHttpRequest' }        });        const result = await response.json();        if (result && result.status) {            showAlert('success', result.message);            closeModal(document.getElementById('editMasterModal'));            loadMasterList(currentPage);        } else {            showAlert('danger', result ? result.message : 'Update failed');        }    });    // Close Edit Modal Functions    function closeModalEdit() {        editModal.classList.remove('show');        setTimeout(() => {            editModal.style.display = 'none';        }, 300);    }    if(btnCloseEditModal) btnCloseEditModal.onclick = closeModalEdit;    if(btnCancelEditModal) btnCancelEditModal.onclick = closeModalEdit;    // 2. Delete Master Function (Fixed Swal error)    async function deleteMaster(id) {        // Using standard confirm instead of Swal        if(confirm("Are you sure? This will delete the Job and all its Details!")) {            performDelete(id);        }    };    async function performDelete(id) {        const response = await fetchJobData('delete_job', { id: id });        if (response && response.status) {            showAlert('success', response.message);            // Reload the Master List (Not the Temp List)            loadMasterList(currentPage);        } else {            showAlert('danger', response ? response.message : 'Delete failed');        }    }    async function saveJob(isUpdate = false) {        const data = {            job_id: document.getElementById('job_id').value,            job_name: document.getElementById('job_name').value,            job_deadline: document.getElementById('job_deadline').value,            // Note: Batch, Machine, Customer are usually Detail rows,            // so we only update Master fields here.        };        // Validation        if (!data.job_name || !data.job_deadline) {            showAlert('danger', 'Please fill all required fields!');            return;        }        const btn = isUpdate ? buttons.update : buttons.add;        const originalText = btn.innerHTML;        btn.disabled = true;        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';        // Determine Command        const cmd = isUpdate ? 'update_job_master' : 'save';        const response = await fetchJobData(cmd, data);        btn.disabled = false;        btn.innerHTML = originalText;        if (response && response.status) {            showAlert('success', response.message);            clearForm();            // If updating master, reload the master list.            // If adding temp (create), reload temp list.            if (isUpdate) {                loadMasterList(currentPage);            } else {                loadJobList(); // Your temp list loader            }        } else {            showAlert('danger', response ? response.message : 'Operation failed');        }    }</script></body>
