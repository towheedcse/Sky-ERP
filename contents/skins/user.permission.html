<script>
    (function ($) {
        var usersCache = [];

        $(document).ready(function () {
            userPermissionList(1);
            if (typeof jQuery.fn.select2 === 'function') {
                $('#permissions').select2({
                    dropdownParent: $('#permission_container'),
                    allowClear: true,
                });
            }
        });

        window.userPermissionList = function (page) {
            page = page || parseInt($('#currentPage').val()) || 1;
            $('#currentPage').val(page);
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {
                    app: 'permission.manager',
                    cmd: 'api_user_permission_list',
                    search: $('#search').val(),
                    page_no: page
                },
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#userList').html(resp.data.html);
                        $('#paginationList').html(resp.data.pagination);
                        usersCache = resp.data.users || [];
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message || 'Failed to load list.');
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Server error (' + xhr.status + '): could not load user list.');
                }
            });
        };

        window.goPage = function (page) {
            userPermissionList(page);
        };

        window.handleEdit = function (userid) {
            var user = null;
            for (var i = 0; i < usersCache.length; i++) {
                if (usersCache[i].userid == userid) {
                    user = usersCache[i];
                    break;
                }
            }
            if (!user) return;

            $('#userid').val(user.userid);
            $('#userDisplay').val(user.username ? user.userid + ' (' + user.username + ')' : user.userid);

            var permIds = [];
            for (var j = 0; j < user.permissions.length; j++) {
                permIds.push(user.permissions[j].permission_id);
            }
            $('#permissions').val(permIds).trigger('change');
        };

        function clearForm() {
            $('#userid').val('');
            $('#userDisplay').val('');
            $('#permissions').val([]).trigger('change');
            $('#success-alert, #danger-alert').hide();
        }

        $('#btnClearForm').click(clearForm);

        $('#btnUpdate').click(function () {
            $('#success-alert, #danger-alert').hide();

            var userid = $('#userid').val();
            var perms = $('#permissions').val();

            if (!userid) {
                $('#danger-alert').show().html('Please select a user first (click Edit on the list below).');
                return;
            }

            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {
                    app: 'permission.manager',
                    cmd: 'api_update_user_permission',
                    userid: userid,
                    'permissions[]': perms
                },
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        clearForm();
                        $('#success-alert').show().html(resp.message);
                        userPermissionList();
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message);
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Server error (' + xhr.status + '): update failed.');
                }
            });
        });

    }(jQuery));
</script>
