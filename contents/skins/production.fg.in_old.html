function setNextFocus(val){
    if(val!=""){
	$('#inventory_id').val(val);
    }
}
function showhideEquipment(val){
	if(val=="S126"){
		$("#Equipment").show();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#equipment_id').trigger('chosen:activate');
		$('#equipment_id').trigger('chosen:hiding_dropdown');
	}else if(val=="A000017"){
		$("#Equipment").hide();
		$("#raw_material").show();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#raw_material_id').trigger('chosen:activate');
		$('#raw_material_id').trigger('chosen:hiding_dropdown');
	}else if(val=="A000036"){
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").show();
		$("#maintanance").hide();
		$('#fg_id').trigger('chosen:activate');
		$('#fg_id').trigger('chosen:hiding_dropdown');
	}else if(val=="A007758"){
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").show();
		$('#maintanance_id').trigger('chosen:activate');
		$('#maintanance_id').trigger('chosen:hiding_dropdown');
	}else{
		$("#Van").hide();
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").hide();

		$('#equipment_id').val("").trigger('change');
		$('#raw_material_id').val("").trigger('change');
		$('#fg_id').val("").trigger('change');
		$('#maintanance_id').val("").trigger('change');
	}
}


function showInventoryList(section, sub_id){
	if(section=="Equipment"){
		$("#Equipment").show();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#equipment_id').trigger('chosen:activate');
		$('#equipment_id').trigger('chosen:hiding_dropdown');
		$('#equipment_id').val(sub_id).trigger('change');
		$('#inventory_type').val("").trigger('change');
	}else if(section=="raw_material"){
		$("#Equipment").hide();
		$("#raw_material").show();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#raw_material_id').trigger('chosen:activate');
		$('#raw_material_id').trigger('chosen:hiding_dropdown');
		$('#raw_material_id').val(sub_id).trigger('change');
		$('#inventory_type').val("A000017").trigger('change');
	}else if(section=="fg"){
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").show();
		$("#maintanance").hide();
		$('#fg_id').trigger('chosen:activate');
		$('#fg_id').trigger('chosen:hiding_dropdown');
		$('#fg_id').val(sub_id).trigger('change');
		$('#inventory_type').val("A000036").trigger('change');
	}else if(section=="maintanance"){
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").show();
		$('#maintanance_id').trigger('chosen:activate');
		$('#maintanance_id').trigger('chosen:hiding_dropdown');
		$('#maintanance_id').val(sub_id).trigger('change');
		$('#inventory_type').val("A007758").trigger('change');
	}else{
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#inventory_type').val("").trigger('change');
	}
}

const supplierData = <?= $supplierData; ?>;

function handleStoreChange(store_id){
	const match = supplierData.find(item => item.point_id === store_id);

	if (match && match.sub_id != null && match.sub_id != "") {
	     showInventoryList(match.section, match.sub_id)
	}else{
		$("#Equipment").hide();
		$("#raw_material").hide();
		$("#fg").hide();
		$("#maintanance").hide();
		$('#inventory_type').val("").trigger('change');

	}
}

function wantToSave(e) {
    e.preventDefault();
	var inventory_type = $("#inventory_type").val();
	 if(inventory_type == ""){
	     alert("please select inventory type");
	     return false;
	}

	if(confirm("Sure want ot submit???")==true){
	    const form = document.getElementById('frmbuyerorder');
	    HTMLFormElement.prototype.submit.call(form);
	} else{
	    return false;
	}
}
