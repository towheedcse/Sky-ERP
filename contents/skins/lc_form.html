<script>
    $(document).ready(function () {
        // --- INITIALIZE SELECT2 ON ALL SELECT ELEMENTS ---
        $('select').each(function () {
            $(this).select2({
                width: '100%',
                placeholder: 'Select an option',
                allowClear: true,
                // dropdownParent: $(this).parent()
                dropdownParent: $(this).closest('.form-group')
            });

        });

        // Initial mode setup
        var mode = "<?=$mode_of_payment?>";
        if (mode == "") mode = "Check";
        showhideCashCheck(mode);
    });

    function showhideCashCheck(mode) {
        $('#CheckPanel').hide();
        $('#CashPanel').hide();
        $('#RecievablePanel').hide();

        if (mode === 'Check') $('#CheckPanel').show();
        else if (mode === 'Cash') $('#CashPanel').show();
        else if (mode === 'Recievable') $('#RecievablePanel').show();
    }

    function calTotalValue() {
        var qty = parseFloat($('#qty').val()) || 0;
        var price = parseFloat($('#unit_price').val()) || 0;
        $('#total').val((qty * price).toFixed(2));
    }

    function calNetPayble() {
        var total = parseFloat($('#total_value').val()) || 0;
        var discount = parseFloat($('#discount').val()) || 0;
        $('#net_payble').val((total - discount).toFixed(2));
        calDueAmount();
    }

    function calDueAmount() {
        var net = parseFloat($('#net_payble').val()) || 0;
        var paid = parseFloat($('#paid_amount').val()) || 0;
        $('#due').val((net - paid).toFixed(2));
    }

    function purchaseProcess() {
        var tbody = $('#tbs');
        // Get text, not value, for display
        var cat = $('#catagory').select2('data')[0].text;
        var brand = $('#brand').select2('data')[0].text;
        var prod = $('#product').select2('data')[0].text;
        var serial = $('#serial').val();
        var qty = $('#qty').val();
        var price = $('#unit_price').val();
        var total = $('#total').val();

        if (qty == "" || price == "") {
            alert("Please enter Quantity and Unit Price");
            return;
        }

        var row = `<tr>
            <td>${cat}</td>
            <td>${brand}</td>
            <td>${prod}</td>
            <td>${serial}</td>
            <td>-</td>
            <td>${qty}</td>
            <td>${price}</td>
            <td>${total}</td>
            <td><button type="button" class="btn btn-danger" onclick="jQuery(this).closest('tr').remove();">X</button></td>
        </tr>`;

        tbody.append(row);

        // Update Grand Total Mockup
        var currentGrand = parseFloat($('#total_value').val()) || 0;
        var newTotal = parseFloat(total) || 0;
        $('#total_value').val((currentGrand + newTotal).toFixed(2));
        calNetPayble();

        // Clear Inputs
        $('#qty').val('');
