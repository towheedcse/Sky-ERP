<script>

    const inventoryHeads = {
        "equipment" : <?= json_encode($equipment_list); ?>,
    "raw_material" : <?= json_encode($raw_material_list); ?>,
    "fg" : <?= json_encode($fg_list); ?>,
    "maintenance" : <?= json_encode($maintanance_list); ?>
    };

    const supplierData = <?= $supplierData; ?>;

</script>

<script>
    $(document).ready(function() {
        $("#production_date").val(new Date().toISOString().split('T')[0]);
        $('#finish_goods').select2({
            dropdownParent: $('#finish_goods_container')
        });
    });

    const API_URL = "index.php?app=fg.production";
    let productionItems = [];
    let sl = 1;

    // ADD ITEM
    $("#addItem").on("click", function () {
        $("#danger-alert").hide().text("");
        $("#success-alert").hide().text("");

        let factory = $("#factory").val();
        let factoryText = $("#factory option:selected").text();

        let production_date = $("#production_date").val();

        let product = $("#finish_goods").val();
        let productText = $("#finish_goods option:selected").text();

        let qty = $("input[type='number']").val();

        let store = $("#store").val();
        let storeText = $("#store option:selected").text();

        let jobID = $("#job_id").val();
        let jobIDText = $("#job_id option:selected").text();
        if(jobID == ""){
            jobIDText = "";
        }

        let jobName = $("#job_name").val();
        let jobNameText = $("#job_name option:selected").text();
        if(jobName == ""){
            jobNameText = "";
        }

        let invType = $(".global-inv-type").val();
        let invTypeText = $(".global-inv-type option:selected").text();

        let invHead = $(".global-inv-head").val();
        let invHeadText = $(".global-inv-head option:selected").text();

        if(product == "" || qty == "" || store == ""){
            $("#danger-alert").show().text("Please fill all required fields");
            return;
        }
        if(!production_date){
            $("#danger-alert").show().text("Please select production date");
            return;
        }

        let qtyInKg = "";

        let item = {
            factory: factory,
            factoryText: factoryText,
            product: product,
            productText: productText,
            qty: qty,
            qtyInKg: qtyInKg,
            store: store,
            storeText: storeText,
            jobID: jobID,
            jobIDText: jobIDText,
            jobName: jobName,
            jobNameText: jobNameText,
            invType: invType,
            invTypeText: invTypeText,
            invHead: invHead,
            invHeadText: invHeadText,
            production_date: production_date
        };

        productionItems.push(item);

        renderTable();

        clearItemFields();
    });


    // RENDER TABLE
    function renderTable(){

        let html = "";

        if(productionItems.length === 0){
            html = `
        <tr class="text-center">
            <td colspan="9" class="text-center">No Record Found</td>
        </tr>`;
        }else{

            productionItems.forEach(function(item,index){
                html += `
            <tr>
                <td>${index+1}</td>
                <td>${item.jobNameText}</td>
                <td>${item.productText}</td>
                <td>${item.qty}</td>
                <td>${item.production_date}</td>
                <td>${item.storeText}</td>
                <td>${item.invTypeText}</td>
                <td>${item.invHeadText}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-danger removeItem" data-index="${index}">
                        Remove
                    </button>
                </td>
            </tr>`;
            });

        }

        $("#tableData").html(html);
    }


    // REMOVE ITEM
    $(document).on("click",".removeItem",function(){
        let index = $(this).data("index");
        productionItems.splice(index,1);
        renderTable();
    });

    // CLEAR INPUTS
    function clearItemFields(){
        $("#finish_goods").val('').trigger('change');
        $("input[type='number']").val(0);
        $("#job_id").val('').trigger('change');
        $("#job_name").val('');
    }

    // SUBMIT DATA
    $("#saveProduction").on("click", function(){
        $("#danger-alert").hide().text("");
        $("#success-alert").hide().text("");

        if(productionItems.length === 0){
            $("#danger-alert").show().text("Please add at least one item");
            return;
        }

        let URL = API_URL + "&cmd=bulk_production";
        axios.post(URL, {rows: productionItems})
            .then(function (response) {
                $("#danger-alert").hide().text("");
                $("#success-alert").hide().text("");

                if(response.data.status === true){
                    $("#success-alert").show().text("Production saved successfully");
                    productionItems = [];
                    renderTable();
                }else{
                    $("#danger-alert").show().text(response.data.message);
                }
            })
            .catch(function (error) {
                //console.log(error);
            });
    });


    // inventory type change
    $(".global-inv-type").on("change", function(){
        let type = $(this).val();
        let list = [];
        if(type === "S126"){
            list = inventoryHeads.equipment;
        }
        else if(type === "A000017"){
            list = inventoryHeads.raw_material;
        }
        else if(type === "A000036"){
            list = inventoryHeads.fg;
        }
        else if(type === "A007758"){
            list = inventoryHeads.maintenance;
        }
        populateInventoryHead(list);
    });


    // populate inventory head dropdown
    function populateInventoryHead(list){
        let html = `<option value="">Select Head</option>`;
        if(list && list.length > 0){
            list.forEach(function(item){
                html += `
                <option value="${item.sub_id}">
                    ${item.sub_head_name}
                </option>
            `;
            });
        }
        $(".global-inv-head").html(html);
    }

    // set hidden inventory id
    $(document).on("change",".global-inv-head",function(){
        let val = $(this).val();
        $("#inventory_id").val(val);
    });

    function handleStoreChange(store_id){
        const match = supplierData.find(item => item.point_id === store_id);
        if(match && match.sub_id){
            if(match.section === "Equipment"){
                $(".global-inv-type").val("S126").trigger("change");
            }
            else if(match.section === "raw_material"){
                $(".global-inv-type").val("A000017").trigger("change");
            }
            else if(match.section === "fg"){
                $(".global-inv-type").val("A000036").trigger("change");
            }
            else if(match.section === "maintanance"){
                $(".global-inv-type").val("A007758").trigger("change");
            }
            setTimeout(function(){
                $(".global-inv-head").val(match.sub_id).trigger("change");
            },200);
        }else{
            $(".global-inv-type").val("");
            $(".global-inv-head").html(`<option value="">Select Head</option>`);
            $("#inventory_id").val("");
        }
    }

    $("#store").on("change", function(){
        let store_id = $(this).val();
        handleStoreChange(store_id);
    });

    $('#job_name').on('change', function() {
        var selectedOption = this.options[this.selectedIndex];
        var finishItem = selectedOption.getAttribute('data-finish_item');

        if (finishItem) {
            $("#finish_goods").val(finishItem).trigger('change');
        } else {
            $("#finish_goods").val('').trigger('change');
        }
    });


</script>
