function addPOProduct(voucher_no){
	var voucher_no 		= document.getElementById('po_no').value;
	
	var purchase_date 	= document.getElementById('purchase_date').value;
	var quotation_no 	= document.getElementById('quotation_no').value;
	var warranty 	= document.getElementById('warranty').value;

	if(voucher_no != "") {
		const data = {
			voucher_no:voucher_no,
			purchase_date:purchase_date,
			quotation_no:quotation_no,
			warranty:warranty,
		}

		if (confirm("Sure want to add product???")) {
			$.ajax({
				url: '?app=purchase_item_received&cmd=addPOProduct',
				type: 'POST',
				data: JSON.stringify(data),
				contentType: 'application/json',
				dataType: 'json',
				success: function (response) {
					if (response.status) {
						$("#tbs").html(response.data.table);
						const total_value = parseFloat(response.data.total_value);
						
						$("#total_value").val(response.data.total_value);
$("#net_payble").val(response.data.total_value);
						$("#supplier").val(response.data.supplier_id);
						$("#store_id").val(response.data.storeId);
if(response.data.purchase_date && response.data.purchase_date != "" && response.data.purchase_date!= "null"){
	$("#purchase_date").val(response.data.purchase_date);
}
						
						$("#po_no_value").val(response.data.poVoucherNo);
						$("#showSprNo").html(response.data.poVoucherNo);
						$("#po_no").val("").trigger("change");
					} else {
						alert(response.mesage);
					}
				},
				error: function (xhr, status, error) {
					alert('AJAX request failed: ' + error);
				}
			});
		} else {
			$("#po_no").val("").trigger("change");
			return false;
		}
	}
	return false;
}


function editTempPo(tmpId){
	if(tmpId==""){
		alert('ID Missing');
	}

	$.ajax({
		url: '?app=purchase_item_received&cmd=editTempPoItem',
		type: 'POST',
		data: JSON.stringify({tmpId:tmpId}),
		contentType: 'application/json',
		dataType: 'json',
		success: function (response) {
			if (response.status) {
				const data = response.data || {};

				var productid = data.productid;
				var product_name = data.product_name;
				var brand_id = data.brand_id;
				var brandname = data.brandname;
				var catagory = data.catagory;
				var catagoryname = data.catagoryname;
				var details = data.details;
				var serial = data.serial;
				var warranty = data.warranty;
				var qty = data.qty;
				var free_qty = data.free_qty;
				var unit_price = data.unit_price;
				var unit_discount = data.unit_discount;
				var total = data.total;
				var tmp_id = data.tmp_id;
				var po_voucher_no = data.po_voucher_no;
				var pod_id = data.pod_id;
				var max_qty = data.max_qty;

				$("#product").val(productid).trigger("chosen:updated").trigger("change");
				$("#catagory").val(catagory);
				$("#brand").val(brand_id);
				$("#details").val(details);
				$("#serial").val(serial);
				$("#warranty").val(warranty);
				$("#qty").val(qty);
				$("#free_qty").val(free_qty);
				$("#unit_price").val(unit_price);
				$("#unit_discount").val(unit_discount);
				$("#total").val(total);
				$("#edit_product_qty").val(qty);
				$("#edit_product_id").val(productid);
				$("#tmp_id").val(tmp_id);

				$("#po_voucher_no").val(po_voucher_no);
				$("#pod_id").val(pod_id);
				$("#max_qty").val(max_qty);	
			} else {
				alert(response.mesage);
			}
		},
		error: function (xhr, status, error) {
			alert('AJAX request failed: ' + error);
		}
	});

}
