function loadCustomerInvoice(customer_id){
    if(customer_id != "") {
        $.ajax({
		url: '?app=sales.order&cmd=get_customer_invoice',
		type: 'POST',
		data: JSON.stringify({customer_id: customer_id}),
		contentType: 'application/json',
		dataType: 'json',
		success: function (response) {
			if (response.status) {
			    handleAgingDate(response.data.aging_invoice);
			    $("#invoice").html(response.data.invoiceList).trigger("chosen:updated");
			} else {
			    console.log("Error: ", response.message);
			}
		},
		error: function (xhr, status, error) {
			console.log("Error: ", error);
		}
	});
    }
}

function loadCustomerInvoiceItems(invoice_no){
    if(invoice_no != "") {
	const customer_id = $("#customer").val();
	const wo_no = $("#wo_no").val();
	const currency = $("#currency").val();
	const parts = currency.split("###");

	const currency_id = parts[0];
	const currency_code = parts[1];

	const area = $("#area").val();
	const delivery_point = $("#delivery_point").val();
	const bill_date = $("#bill_date").val();
	const aging_date = $("#aging_date").val();
	const bill_note = $("#bill_note").val();

	const formData = {
		invoice_no: invoice_no,
		customer_id:customer_id,
		wo_no:wo_no,
		currency:currency_id,
		currency_code:currency_code,
		area:area,
		delivery_point:delivery_point,
		bill_date:bill_date,
		aging_date:aging_date,
		bill_note:bill_note,
	}

	$.ajax({
		url: '?app=sales.order&cmd=get_customer_invoice_items',
		type: 'POST',
		data: JSON.stringify(formData),
		contentType: 'application/json',
		dataType: 'json',
		success: function (response) {
			if (response.status) {
			    updateUI(response);
			} else {
			    console.log("Error: ", response.message);
			}
		},
		error: function (xhr, status, error) {
			console.log("Error: ", error);
		}
	});
    }
}


function getTodayDMY() {
    const today = new Date();
    const dd = String(today.getDate()).padStart(2, '0');
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const yyyy = today.getFullYear();
    return `${dd}-${mm}-${yyyy}`;
}

function closeModal()
{
    document.getElementById("overdueModal").style.display = "none";
}

window.onclick = function(event) {
    var modal = document.getElementById("overdueModal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}


var credit_days = 0;


function handleAgingDate(response) {
    var credit_days = 0; // default to 0

    // If response has agingDate, use it
    if (response && response.agingDate !== "") {
        credit_days = Number(response.credit_days) || 0;

        var today = new Date();
        var dayStr = ("0" + today.getDate()).slice(-2);
        var monthStr = ("0" + (today.getMonth() + 1)).slice(-2);
        var yearStr = today.getFullYear();
        $("#bill_date").val(dayStr + "-" + monthStr + "-" + yearStr);

        $("#aging_date").val(response.agingDate);
        showOrverInvoice(response);
        return false;
    }

    // Get bill_date from input
    var bill_date = $("#bill_date").val();
    var date;

    if (!bill_date) {
        date = new Date(); // current date
    } else {
        // Convert dd-mm-yyyy to Date safely
        var parts = bill_date.split("-");
        var day = Number(parts[0]);
        var month = Number(parts[1]) - 1; // month index starts from 0
        var year = Number(parts[2]);

        date = new Date(year, month, day);
    }

    // Check if date is valid
    if (isNaN(date.getTime())) {
        date = new Date(); // fallback to current date
    }

    // Add credit_days safely
    credit_days = Number(credit_days) || 0;
    date.setDate(date.getDate() + credit_days);

    // Format dd-mm-yy
    var dayStr = ("0" + date.getDate()).slice(-2);
    var monthStr = ("0" + (date.getMonth() + 1)).slice(-2);
    var yearStr = date.getFullYear().toString().slice(-2);

    var aging_date = dayStr + "-" + monthStr + "-" + yearStr;

    // Set the aging_date input
    $("#aging_date").val(aging_date);
}

$(document).ready(function(){
    handleAgingDate();

    var lastDate = $("#bill_date").val();
    setInterval(function(){
        var currentDate = $("#bill_date").val();
        if(currentDate !== lastDate){
            lastDate = currentDate;
            handleAgingDate();
        }
    }, 500);
});

function updateUI(response){
	const data = response.data.invoiceItemList;
	const invoiceList = response.data.invoiceList;

	$("#customer").val(data.bill.customer).trigger("chosen:updated");
	if(data.bill.und_no && data.bill.und_no != "null"){
		$("#wo_no").val(data.bill.und_no);
	}

	const currency_id = data.bill.currency || 1;
	const currency_code = data.bill.currency_code || "BDT";
	const currency = currency_id + "###" + currency_code;
	$("#currency").val(currency).trigger("chosen:updated");

	if(data.bill.area && data.bill.area != "null"){
		$("#area").val(data.bill.area);
	}
	if(data.bill.store_id && data.bill.store_id != "null"){
		$("#delivery_point").val(data.bill.store_id);
	}

	const todayDate = getTodayDMY();

	// Bill date
	if (data && data.bill && data.bill.bill_date && data.bill.bill_date !== "0000-00-00") {
	    $("#bill_date").val(data.bill.bill_date);
	} else {
	    $("#bill_date").val(todayDate);
	}

	// Aging date
	if (response.data && response.data.aging_invoice && response.data.aging_invoice.agingDate && response.data.aging_invoice.agingDate !== "") {
	    handleAgingDate(response.data.aging_invoice);
	}

	if(response.data && response.data.aging_invoice){
	     showOrverInvoice(response.data.aging_invoice);
	}

	if(data.bill.bill_note){
		$("#bill_note").val(data.bill.bill_note);
	}

	$("#bill_id").val(data.bill.bill_id);

	$("#invoice").html(invoiceList).trigger("chosen:updated");
	$("#invoice").val("").trigger("chosen:updated");

	$("#table_data").html(data.invoices);
	$("#show_invoice").html(data.invoices);
	$("#show_wo_no").html(data.wo_no);

	$("#tbs").html(data.table_data);
	$("#total_amount").val(data.total_value);
	$("#total_value").val(data.total_value);
	$("#additional_cost").val(data.total_additional_cost);
	calNetPayable();
}


function showOrverInvoice(response){
	var saveBtn = document.getElementById("order-save")

	if(response && response.status){
	     saveBtn.disabled = true;
	     saveBtn.classList.add("disable");
	     document.getElementById("overdueContent").innerHTML = response.data;
             document.getElementById("overdueModal").style.display = "block";
	}else{
	     saveBtn.disabled = false;
	     saveBtn.classList.remove("disable");
	}
}


function getInvoiceItems(){
    $.ajax({
	url: '?app=sales.order&cmd=get_invoice_items',
	type: 'POST',
	contentType: 'application/json',
	dataType: 'json',

	    } else {
	        console.log("Error: ", response.message);
	    }
	},
	error: function (xhr, status, error) {
		console.log("Error: ", error);
	}
    });
    
}

getInvoiceItems();

function wantToSaveBill(e)
{
	e.preventDefault();
	var net_payble = parseFloat(document.getElementById('net_payble').value);

	const customer_id = $("#customer").val();
	const bill_date = $("#bill_date").val();
	const aging_date = $("#aging_date").val();
	if(customer_id == "" || bill_date == "" || aging_date ==""){
		alert("Please enter Customer/Bill Date/ Aging Date first...");
		return false;
	}

	if(net_payble){
	    if(confirm("Sure want ot submit???")==true){
		const form = document.getElementById('frmbuyerorder');

		// ✅ Force the real submit method to run, even if it's shadowed
		HTMLFormElement.prototype.submit.call(form);
	    } else{
	        return false;
	    }
		
	}else{
	    alert("!!Net payable must not be zero ...");
	    return false;
	}
}

function calTotalVat() {
		var total_amount = parseFloat(document.getElementById('total_value').value) || 0;
		var vat_type = document.getElementById('vat_type').value; // percent | fixed
		var vat_input = parseFloat(document.getElementById('total_vat_percent').value) || 0;

		if (vat_input < 0) vat_input = 0;
		var total_vat_amount = 0;

		if (vat_type === 'percent') {
			// limit percentage
			if (vat_input > 100) vat_input = 100;
			document.getElementById('total_vat_percent').value = vat_input;
			// calculate % VAT
			total_vat_amount = (vat_input / 100) * total_amount;
		} else {
			// fixed VAT amount
			total_vat_amount = vat_input;
		}

		document.getElementById('total_vat_amount').value = total_vat_amount.toFixed(9);
		calNetPayable();
	}

function calNetPayable(){
	var total_amount = parseFloat(document.getElementById('total_value').value);
	var general_discount_amount = parseFloat(document.getElementById('general_discount_amount').value);
	var exclusive_discount_amount = parseFloat(document.getElementById('exclusive_discount_amount').value);
	var additional_discount = parseFloat(document.getElementById('additional_discount').value);
	
	var total_vat_amount = parseFloat(document.getElementById('total_vat_amount').value);
	var additional_cost = parseFloat(document.getElementById('additional_cost').value);


	if(isNaN(total_amount) || total_amount==""){total_amount = 0}
	if(isNaN(general_discount_amount)){ general_discount_amount = 0; } 
	if(isNaN(exclusive_discount_amount)){ exclusive_discount_amount = 0; }  
	if(isNaN(additional_discount)){ additional_discount = 0;}
	if(isNaN(total_vat_amount) || total_vat_amount==""){total_vat_amount = 0}
	if(isNaN(additional_cost) || additional_cost==""){additional_cost = 0}

	var totalDiscount = (general_discount_amount+exclusive_discount_amount+additional_discount);

	var netPayable = (total_amount + additional_cost + total_vat_amount) - totalDiscount;
	document.getElementById('net_payble').value = netPayable.toFixed(9);
}

function calBillGDiscount()
{
	var total_amount = parseFloat(document.frmbuyerorder.total_amount.value);
	var general_discount_percent = parseFloat(document.frmbuyerorder.general_discount_percent.value);

	if(isNaN(total_amount)){ total_amount = 0; } if(isNaN(general_discount_percent)){ general_discount_percent = 0; }

	var general_discount_amount = ((total_amount/100)*general_discount_percent);
	var netPay = (total_amount - general_discount_amount);
	document.frmbuyerorder.general_discount_amount.value=general_discount_amount.toFixed(2);
	document.frmbuyerorder.net_payble.value =  netPay.toFixed(4);
	calNetPayable();
}
function calBillExDiscount()
{
	var total_amount 				= parseFloat(document.frmbuyerorder.total_amount.value);
	var exclusive_discount_percent = parseFloat(document.frmbuyerorder.exclusive_discount_percent.value);
	var general_discount_amount 	= parseFloat(document.frmbuyerorder.general_discount_amount.value);
	if(isNaN(total_amount)){ total_amount = 0; } if(isNaN(exclusive_discount_percent)){ exclusive_discount_percent = 0; } if(isNaN(general_discount_amount)){ general_discount_amount = 0; }

	var NetAmount = (total_amount-general_discount_amount);
	var exclusive_discount_amount = ((NetAmount/100)*exclusive_discount_percent);
	var netPay = (NetAmount - exclusive_discount_amount);
	document.frmbuyerorder.exclusive_discount_amount.value=exclusive_discount_amount.toFixed(2);
	document.frmbuyerorder.net_payble.value =  netPay.toFixed(4);
	calNetPayable();
}

function calBillAdditionalDiscount()
{
	var total_amount 				 = parseFloat(document.frmbuyerorder.total_amount.value);
	var general_discount_amount 	 = parseFloat(document.frmbuyerorder.general_discount_amount.value);
	var exclusive_discount_amount  = parseFloat(document.frmbuyerorder.exclusive_discount_amount.value);
	var additional_discount_percent = parseFloat(document.frmbuyerorder.additional_discount_percent.value);

	if(isNaN(total_amount)){ total_amount = 0; } if(isNaN(exclusive_discount_amount)){ exclusive_discount_amount = 0; } if(isNaN(general_discount_amount)){ general_discount_amount = 0; }
	if(isNaN(additional_discount_percent)){ additional_discount_percent = 0; }
	var NetAmount = (total_amount-(general_discount_amount+exclusive_discount_amount));
	var additional_discount_amount = ((NetAmount/100)*additional_discount_percent);
	var netPay = (NetAmount - additional_discount_amount);
	document.frmbuyerorder.additional_discount.value=additional_discount_amount.toFixed(2);
	document.frmbuyerorder.net_payble.value =  netPay.toFixed(4);

	var customerbalance = parseFloat(document.getElementById('customerbalance').value); if(isNaN(customerbalance)){ customerbalance = 0; }
	var customerlimit    = parseFloat(document.getElementById('customer_limit').value); if(isNaN(customerlimit)){ customerlimit = 0; }
	if(customerbalance >=0){
		var TotalBalance = customerbalance+netPay;
	}else{
		var TotalBalance =0;
	}
	if(TotalBalance >= customerlimit){
		document.getElementById("order-save").type.visibility="hidden"; //document.getElementById("order-save").type.visibility="hidden"; alert("OK");
	}else{
		document.getElementById("order-save").type.visibility="visible"; //document.getElementById("order-save").type="submit"; // document.getElementById("order-save").disabled = true; alert("dOK");
	}
	calNetPayable();
}
