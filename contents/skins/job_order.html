js"></script><script>    // --- Vanilla JS Implementation ---    const API_URL = "index.php?app=job_order";    // Elements    const form = document.getElementById('jobForm');    const tableBody = document.getElementById('jobTableBody');    const searchInput = document.getElementById('searchInput');    const alerts = {        success: document.getElementById('success-alert'),        danger: document.getElementById('danger-alert')    };    const buttons = {        add: document.getElementById('addItem'),        update: document.getElementById('updateItem'),        reset: document.getElementById('reset'),        saveBatch: document.getElementById('saveBatchBtn')    };    // Initial Load    document.addEventListener('DOMContentLoaded', () => {        setTodayDate();        loadJobList();    });    // Set Date to Today    function setTodayDate() {        const dateInput = document.getElementById('job_deadline');        const today = new Date().toISOString().split('T')[0];        dateInput.value = today;    }    // --- Helper Functions ---    function showAlert(type, message) {        alerts.success.classList.remove('show');        alerts.danger.classList.remove('show');        if(type === 'success') {            alerts.success.textContent = message;            alerts.success.classList.add('show');        } else {            alerts.danger.textContent = message;            alerts.danger.classList.add('show');        }        // Auto hide after 3 seconds        setTimeout(() => {            alerts.success.classList.remove('show');            alerts.danger.classList.remove('show');        }, 4000);    }    // Fetch Wrapper    async function fetchJobData(cmd, data = {}) {        const formData = new FormData();        formData.append('cmd', cmd);        for (const key in data) {            formData.append(key, data[key]);        }        try {            const response = await fetch(API_URL, {                method: 'POST',                body: formData,                headers: { 'X-Requested-With': 'XMLHttpRequest' } // Mark as AJAX            });            return await response.json();        } catch (error) {            showAlert('danger', 'Server connection error!');            return null;        }    }    // --- Core Functions ---    // 1. Load List    async function loadJobList() {        const searchTerm = searchInput.value.trim();        const response = await fetchJobData('get_list', { search: searchTerm });        if (response && response.html) {            tableBody.innerHTML = response.html;        } else {            tableBody.innerHTML = '<tr><td colspan="7" class="text-center p-4">Error loading data</td></tr>';        }    }    // 2. Add / Update Job    async function saveJob(isUpdate = false) {        const data = {            job_id: document.getElementById('job_id').value,            job_name: document.getElementById('job_name').value,            job_deadline: document.getElementById('job_deadline').value,            batch_id: document.getElementById('batch_id').value,            machine_id: document.getElementById('machine_id').value,            customer_id: document.getElementById('customer_id').value        };        // Validation        if (!data.batch_id || !data.machine_id || !data.customer_id) {            showAlert('danger', 'Please fill all required fields!');            return;        }        // UI Feedback        const btn = isUpdate ? buttons.update : buttons.add;        const originalText = btn.innerHTML;        btn.disabled = true;        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';        const response = await fetchJobData('save', data);        // Restore UI        btn.disabled = false;        btn.innerHTML = originalText;        if (response && response.status) {            showAlert('success', response.message);            clearDetailsForm();            loadJobList();        } else {            showAlert('danger', response ? response.message : 'Save failed');        }    }    // 3. Edit Job    async function editTempRecord(id) {        const response = await fetchJobData('get_by_id', { tmp_id: id });        if (response && response.status && response.data) {            const d = response.data;            document.getElementById('job_id').value = d.id;            document.getElementById('job_name').value = d.name;            document.getElementById('job_deadline').value = d.deadline;            document.getElementById('batch_id').value = d.batch_id;            document.getElementById('machine_id').value = d.machine_id;            document.getElementById('customer_id').value = d.customer_id;            // Toggle Buttons            buttons.add.style.display = 'none';            buttons.update.style.display = 'inline-flex';            showAlert('success', 'Ready to edit!');            // Scroll to top            window.scrollTo({ top: 0, behavior: 'smooth' });        } else {            showAlert('danger', 'Failed to load record');        }    }    // 4. Delete Job    async function deleteTempRecord(id) {        // Using standard confirm for simplicity (can be replaced with SweetAlert if included)        if(confirm("Are you sure you want to delete this Job?")) {            const response = await fetchJobData('delete', { deleted_id: id });            if (response && response.status) {                showAlert('success', response.message);                loadJobList();            } else {                showAlert('danger', response ? response.message : 'Delete failed');            }        }    }    function clearDetailsForm() {        document.getElementById('batch_id').value = "";        document.getElementById('machine_id').value = "";        document.getElementById('customer_id').value = "";        buttons.add.style.display = 'inline-flex';        buttons.update.style.display = 'none';        // Clear alerts        alerts.success.classList.remove('show');        alerts.danger.classList.remove('show');    }    // 5. Clear Form    function clearForm() {        form.reset();        document.getElementById('job_id').value = "";        setTodayDate();        buttons.add.style.display = 'inline-flex';        buttons.update.style.display = 'none';        // Clear alerts        alerts.success.classList.remove('show');        alerts.danger.classList.remove('show');    }    // --- Event Listeners ---    buttons.add.addEventListener('click', () => saveJob(false));    buttons.update.addEventListener('click', () => saveJob(true));    buttons.reset.addEventListener('click', clearForm);    buttons.saveBatch.addEventListener('click', (event) => saveBatch(event));    // Search Debounce    let timeout = null;    searchInput.addEventListener('keyup', function() {        clearTimeout(timeout);        timeout = setTimeout(function() {            loadJobList();        }, 500); // 500ms delay    });    async function saveBatch(event) {        event.preventDefault();        // Hide alerts        alerts.success.classList.remove('show');        alerts.danger.classList.remove('show');        // Gather Data        const formData = {            "batch_name": document.getElementById('batch_id').value || "",            "job_name": document.getElementById('job_name').value,            "job_deadline": document.getElementById('job_deadline').value,        };        // Get table rows (assuming your table has id="finishGoodsTable")        const tableRows = document.querySelectorAll('#jobTableBody tr');        // Validation        if (formData.job_name === "" || formData.job_deadline === "") {            //showAlert('danger', 'Please fill required fields (Job Name, Deadline)');            //return false;        }        if (tableRows.length === 0) {            showAlert('danger', 'Please add job details');            return false;        }        // UI Feedback        const originalText = buttons.saveBatch.innerHTML;        buttons.saveBatch.disabled = true;        buttons.saveBatch.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';        try {            const response = await fetchJobData('save_batch', formData);            if (response && response.status) {                showAlert('success', response.message);                // Refresh the list (temp table should now be empty or updated)                // Note: response.data.htmlData.html might contain the new table HTML                if (response.data && response.data.htmlData && response.data.htmlData.html) {                    tableBody.innerHTML = response.data.htmlData.html;                } else {                    loadJobList(); // Fallback reload                }                // Reset Form                clearForm();            } else {                showAlert('danger', response ? response.message : 'Error saving batch');            }        } catch (e) {            showAlert('danger', 'Server error');        } finally {            buttons.saveBatch.disabled = false;            buttons.saveBatch.innerHTML = originalText;        }    }</script></body>
