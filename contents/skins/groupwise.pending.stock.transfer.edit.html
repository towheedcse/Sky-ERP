	// ---- PENDING EDIT: override prepareTblGrid to call pending_save_tmp ----
	function prepareTblGrid() {
		var productid = document.getElementById('product').value;
		var new_product_id = "";

		if (document.getElementById("convert_product").checked) {
			new_product_id = document.getElementById('new_product').value;
			if (new_product_id == "") {
				alert("Please select New Product for conversion.");
				return false;
			}
		}

		var unit_price   = parseFloat(document.getElementById('unit_price').value);
		var qty          = parseFloat(document.getElementById('qty').value);
		var total        = (unit_price * qty);
		var currencyIdName = document.getElementById('currency').value;
		var currencyArr  = currencyIdName.split("###");
		var currency     = currencyArr[0];
		var currencyName = currencyArr[1];
		var transfer_from  = document.getElementById('transfer_from').value;
		var delivery_point = document.getElementById('delivery_point').value;
		var transfer_date  = document.getElementById('transfer_date').value;
		var transfer_id    = document.getElementById('transfer_id').value;
		var tmp_id         = document.getElementById('edit_tmp_id').value;

		if (productid !== "" && !isNaN(qty) && qty > 0) {
			httpSaveProduct.open("GET",
				"index.php?app=groupwise.stock.transfer&cmd=pending_save_tmp" +
				"&transfer_id=" + transfer_id +
				"&tmp_id=" + tmp_id +
				"&transfer_from=" + transfer_from +
				"&delivery_point=" + delivery_point +
				"&transfer_date=" + transfer_date +
				"&currency=" + currency +
				"&currencyName=" + encodeURIComponent(currencyName) +
				"&productid=" + productid +
				"&new_product_id=" + new_product_id +
				"&qty=" + qty +
				"&unit_price=" + unit_price +
				"&total=" + total.toFixed(2),
			true);
			httpSaveProduct.onreadystatechange = handlePendingEditSaveResponse;
			httpSaveProduct.send(null);
		} else {
			chkTransferQty(qty);
		}
	}

	// ---- PENDING EDIT: handle AJAX response from pending_save_tmp ----
	function handlePendingEditSaveResponse() {
		if (httpSaveProduct.readyState == 4 && httpSaveProduct.status == 200) {
			var rawResponse  = httpSaveProduct.responseText.replace(/^\s+|\s+$/g, '');
			var arrSaveOrder = rawResponse.split("####-@@@@");
			var tbl          = arrSaveOrder[0];
			var total_amount = parseFloat(arrSaveOrder[1]);

			if (isNaN(total_amount)) { total_amount = 0; }

			document.getElementById('total_amount').value = total_amount;
			document.getElementById('tbs').innerHTML       = tbl;

			// Reset product entry section for next item
			document.getElementById('edit_tmp_id').value  = '';
			document.getElementById('qty').value          = '';
			document.getElementById('unit_price').value   = '';
			document.getElementById('total').value        = '';
			document.getElementById('stock_qty').value    = '';
			document.getElementById('next_btn').value     = 'Next';

			// Reset chosen dropdowns
			if (document.getElementById('product')) {
				document.getElementById('product').value = '';
				J('#product').trigger('chosen:updated');
			}
			if (document.getElementById('new_product')) {
				document.getElementById('new_product').value = '';
				J('#new_product').trigger('chosen:updated');
			}

			// Restore convert product column from response (index 3 = productConvert)
			var isConvert = arrSaveOrder[3];
			if (isConvert && isConvert !== "" && isConvert !== "0" && isConvert !== "false") {
				document.getElementById("convert_product").checked = true;
				document.getElementById("convert_product_section_label").style.display = "";
				document.getElementById("convert_product_section").style.display = "";
				document.getElementById("emptyTd").style.display = "";
			}

			document.getElementById('product').focus();
		}
	}

	// ---- PENDING EDIT: override handlePSResponse so it does NOT wipe qty/unit_price during row-edit ----
	// getProductStock() resets qty=0 before the AJAX call and handlePSResponse overwrites unit_price on
	// return — both destroy the values editTempRow just pre-filled. We save them first and restore here.
	var _editRowQty       = '';
	var _editRowUnitPrice = '';
	var _editRowTotal     = '';

	function handlePSResponse() {
		if (httpLoadPS.readyState == 4) {
			var PScontent  = trim(httpLoadPS.responseText);
			var contentArr = PScontent.split("#####");
			document.getElementById('stock_qty').value     = contentArr[0];
			document.getElementById("qty_s").innerHTML     = " " + contentArr[2];
			document.getElementById("qty_t").innerHTML     = " " + contentArr[2];

			if (document.getElementById('edit_tmp_id').value !== '') {
				// Editing an existing row: restore the saved values
				document.getElementById('qty').value        = _editRowQty;
				document.getElementById('unit_price').value = _editRowUnitPrice;
				document.getElementById('total').value      = _editRowTotal;
				document.getElementById('qty').focus();
			} else {
				// Adding a new row: normal behaviour
				document.getElementById('unit_price').value = contentArr[1];
				document.getElementById('qty').focus();
				document.getElementById('qty').select();
			}
		}
	}

	// ---- PENDING EDIT: pre-fill product form when Edit is clicked on a row ----
	function editTempRow(tmpId, productid, newProductId, qty, unitPrice, total, munit) {
		// Save values BEFORE calling getProductStock() which resets qty to 0
		_editRowQty       = qty;
		_editRowUnitPrice = unitPrice;
		_editRowTotal     = total;

		// Set the row being edited
		document.getElementById('edit_tmp_id').value = tmpId;

		// Pre-fill product dropdown (Chosen)
		document.getElementById('product').value = productid;
		J('#product').trigger('chosen:updated');

		// Handle convert product
		if (newProductId && newProductId !== '') {
			document.getElementById('convert_product').checked = true;
			document.getElementById('convert_product_section_label').style.display = '';
			document.getElementById('convert_product_section').style.display = '';
			document.getElementById('emptyTd').style.display = '';
			document.getElementById('new_product').value = newProductId;
			J('#new_product').trigger('chosen:updated');
		} else {
			document.getElementById('convert_product').checked = false;
			document.getElementById('convert_product_section_label').style.display = 'none';
			document.getElementById('convert_product_section').style.display = 'none';
			document.getElementById('emptyTd').style.display = 'none';
			document.getElementById('new_product').value = '';
			J('#new_product').trigger('chosen:updated');
		}

		// Change button label to show we are updating
		document.getElementById('next_btn').value = 'Update';

		// Trigger stock refresh first (it synchronously resets qty=0, then async-loads stock qty/unit label)
		getProductStock();

		// Pre-fill numeric fields AFTER getProductStock() so its synchronous qty=0 reset cannot clobber them.
		// This makes the FIRST Update save the correct qty without waiting for the async stock response.
		document.getElementById('qty').value        = qty;
		document.getElementById('unit_price').value = unitPrice;
		document.getElementById('total').value      = total;
		document.getElementById('m_unit').value     = munit;

		// Scroll into view
		document.getElementById('product').scrollIntoView({ behavior: 'smooth', block: 'center' });
	}

	// Override wantToSave to use pending_update cmds instead of save_transfer
	function wantToSave(e) {
		e.preventDefault();

		var job_required = J('#job_required').val();
		if (job_required != "" && job_required == "true") {
			var job_name = J('#job_name').val();
			if (job_name == "") { alert("Please enter Job ID/Name"); return false; }
			var finish_item = J('#finish_item').val();
			if (finish_item == "") { alert("Please select Finish Item"); return false; }
		}

		var needSave = parseFloat(document.getElementById('total_amount').value);
		if (needSave > 0) {
			var convert_product = document.getElementById("convert_product").checked;
			if (convert_product) {
				document.getElementById("cmd").value = "pending_update_convert_transfer";
			} else {
				document.getElementById("cmd").value = "pending_update_transfer";
			}
			if (confirm("Sure want to submit???") == true) {
				const form = document.getElementById('frmbuyerorder');
				HTMLFormElement.prototype.submit.call(form);
			} else {
				return false;
			}
		} else {
			alert("Empty data!!! Please enter data first...");
		}
	}
</script>
