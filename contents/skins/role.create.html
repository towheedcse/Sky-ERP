<script>
    var pmSelectedIds = [];

    function pmCheckAll(el) {
        var chk = el.checked;
        jQuery('.permChk, .groupChk').each(function () {
            this.checked = chk;
        });
        pmSelectedIds = [];
        if (chk) {
            jQuery('.permChk').each(function () {
                pmSelectedIds.push(parseInt(jQuery(this).val()));
            });
        }
    }

    function pmCheckGroup(el) {
        var chk = el.checked;
        var $row = jQuery(el).closest('.perm-group-row');
        $row.find('.permChk').each(function () {
            var id = parseInt(jQuery(this).val());
            if (chk) {
                if (pmSelectedIds.indexOf(id) === -1) pmSelectedIds.push(id);
            } else {
                pmSelectedIds = pmSelectedIds.filter(function (x) {
                    return x !== id;
                });
            }
            this.checked = chk;
        });
        pmSyncAll();
    }

    function pmCheckPerm(el) {
        var id = parseInt(jQuery(el).val());
        var chk = el.checked;
        if (chk) {
            if (pmSelectedIds.indexOf(id) === -1) pmSelectedIds.push(id);
        } else {
            pmSelectedIds = pmSelectedIds.filter(function (x) {
                return x !== id;
            });
        }
        var $row = jQuery(el).closest('.perm-group-row');
        var $perms = $row.find('.permChk');
        var allChecked = $perms.length > 0 && $perms.filter(':checked').length === $perms.length;
        $row.find('.groupChk').each(function () {
            this.checked = allChecked;
        });
        pmSyncAll();
    }

    function pmSyncAll() {
        var $perms = jQuery('.permChk');
        var allChecked = $perms.length > 0 && $perms.filter(':checked').length === $perms.length;
        var allEl = document.getElementById('checkAll');
        if (allEl) allEl.checked = allChecked;
    }

    jQuery(document).ready(function () {
        jQuery('#roleForm').submit(function (e) {
            e.preventDefault();
            jQuery('#success-alert, #danger-alert').hide();
            document.getElementById('btnSave').disabled = true;

            var name = jQuery.trim(jQuery('#roleName').val());
            if (!name) {
                jQuery('#danger-alert').show().html('Role name must not be empty!');
                document.getElementById('btnSave').disabled = false;
                return false;
            }
            if (pmSelectedIds.length === 0) {
                jQuery('#danger-alert').show().html('Please select at least one permission!');
                document.getElementById('btnSave').disabled = false;
                return false;
            }

            jQuery.ajax({
                type: 'POST',
                url: 'index.php',
                data: {app: 'permission.manager', cmd: 'api_store_role', name: name, 'permissions[]': pmSelectedIds},
                dataType: 'json',
                success: function (resp) {
                    document.getElementById('btnSave').disabled = false;
                    if (resp.status) {
                        jQuery('#success-alert').show().html(resp.message);
                        jQuery('#roleName').val('');
                        pmSelectedIds = [];
                        jQuery('input[type=checkbox]').each(function () {
                            this.checked = false;
                        });
                    } else {
                        jQuery('#danger-alert').show().html(resp.message);
                    }
                }
            });
            return false;
        });

        jQuery('#btnClear').click(function (e) {
            e.preventDefault();
            pmSelectedIds = [];
            jQuery('input[type=checkbox]').each(function () {
                this.checked = false;
            });
            jQuery('#roleName').val('');
            jQuery('#success-alert, #danger-alert').hide();
        });
    });
</script>
