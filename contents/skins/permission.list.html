<script>
    (function ($) {
        var currentPage = 1;

        /* ---- Load list ---- */
        window.getPermissionList = function (page) {
            if (page) currentPage = page;
            var search = $.trim($('#search').val());
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {app: 'permission.manager', cmd: 'api_permission_list', search: search, page_no: currentPage},
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#permissionList').html(resp.data.html);
                        $('#paginationList').html(resp.data.pagination);
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message || 'Load failed');
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Server error: ' + xhr.status);
                }
            });
        };

        /* Pagination */
        window.goPage = function (page) {
            getPermissionList(page);
        };

        /* Load single permission for editing */
        window.editPermission = function (id) {
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {app: 'permission.manager', cmd: 'api_permission_by_id', id: id},
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#pName').val(resp.data.name);
                        $('#pSlug').val(resp.data.slug);
                        $('#pGroup').val(resp.data.group_name);
                        $('#editId').val(resp.data.id);
                        $('#success-alert').show().html('Ready to Edit: <strong>' + resp.data.name + '</strong>');
                        $('#danger-alert').hide();
                    }
                }
            });
            return false;
        };

        /* Delete */
        window.deletePermission = function (id) {
            if (!confirm('Delete this permission? Related role and user assignments will also be removed.')) {
                return false;
            }
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {app: 'permission.manager', cmd: 'api_delete_permission', deleted_id: id},
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#success-alert').show().html(resp.message);
                        $('#danger-alert').hide();
                        getPermissionList(currentPage);
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message);
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Delete failed: ' + xhr.status);
                }
            });
            return false;
        };

        /* Clear form */
        function clearFields() {
            $('#pName').val('');
            $('#pSlug').val('');
            $('#pGroup').val('');
            $('#editId').val('');
            $('#search').val('');
            $('#success-alert').hide();
            $('#danger-alert').hide();
        }

        /* Submit */
        $('#permForm').submit(function (e) {
            e.preventDefault();
            $('#success-alert').hide();
            $('#danger-alert').hide();

            var name = $.trim($('#pName').val());
            var slug = $.trim($('#pSlug').val());
            var group = $.trim($('#pGroup').val());
            var id = $('#editId').val();

            if (!name || !slug) {
                $('#danger-alert').show().html('Name and Slug are required.');
                return false;
            }

            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {
                    app: 'permission.manager',
                    cmd: 'api_store_permission',
                    name: name,
                    slug: slug,
                    group: group,
                    edit_id: id
                },
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        clearFields();
                        $('#success-alert').show().html(resp.message);
                        getPermissionList(1);
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message);
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Save failed: ' + xhr.status);
                }
            });
            return false;
        });

        /* Clear button */
        $('#btnClear').click(function (e) {
            e.preventDefault();
            clearFields();
            currentPage = 1;
            getPermissionList(1);
        });

        /* Init */
        $(document).ready(function () {
            getPermissionList(1);
        });

    }(jQuery));
</script>
