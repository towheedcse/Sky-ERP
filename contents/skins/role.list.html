<script>
    (function ($) {
        var currentPage = 1;

        window.getRoleList = function (page) {
            if (page) currentPage = page;
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {
                    app: 'permission.manager',
                    cmd: 'api_role_list',
                    search: $.trim($('#search').val()),
                    page_no: currentPage
                },
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#roleList').html(resp.data.html);
                        $('#paginationList').html(resp.data.pagination);
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message || 'Load failed');
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Server error: ' + xhr.status);
                }
            });
        };

        window.goPage = function (page) {
            getRoleList(page);
        };

        window.deleteRole = function (id) {
            if (!confirm('Delete this role? All user assignments for this role will also be removed.')) {
                return false;
            }
            $.ajax({
                type: 'POST',
                url: 'index.php',
                data: {app: 'permission.manager', cmd: 'api_delete_role', deleted_id: id},
                dataType: 'json',
                success: function (resp) {
                    if (resp && resp.status) {
                        $('#success-alert').show().html(resp.message);
                        $('#danger-alert').hide();
                        getRoleList(currentPage);
                    } else if (resp) {
                        $('#danger-alert').show().html(resp.message);
                    }
                },
                error: function (xhr) {
                    $('#danger-alert').show().html('Delete failed: ' + xhr.status);
                }
            });
            return false;
        };

        $(document).ready(function () {
            getRoleList(1);
        });
    }(jQuery));
</script>
